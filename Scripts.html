// ---- DNAシミュレーター状態 ----
const BASES = ['A','T','G','C'];
let originalDna = '', mutatedDna = '', mutationPositions = new Set();

function randInt(n){ return Math.floor(Math.random()*n); }

function generateDna(len=60){
  return Array.from({length:len},()=>BASES[randInt(4)]).join('');
}

function colorBase(b,cls=''){
  const map={A:'base-a',T:'base-t',G:'base-g',C:'base-c'};
  return `<span class="${map[b]||''} ${cls}">${b}</span>`;
}

function renderDnaDisplay(dna, mutations=new Set()){
  const container = document.getElementById('dna-display');
  if(!container) return;
  let html='<div style="line-height:2.2;font-size:1.1rem;letter-spacing:0.08em;">';
  for(let i=0;i<dna.length;i++){
    if(i>0&&i%30===0) html+='<br>';
    if(i>0&&i%3===0&&i%30!==0) html+='<span style="opacity:0.3">|</span>';
    const cls = mutations.has(i)?'base-mutated':'';
    html+=colorBase(dna[i],cls);
  }
  html+='</div>';
  container.innerHTML=html;
  updateSimStats();
}

function updateSimStats(){
  const el=document.getElementById('sim-mutation-count');
  if(el) el.textContent=mutationPositions.size;
  const el2=document.getElementById('sim-mutation-rate');
  if(el2) el2.textContent=originalDna.length? ((mutationPositions.size/originalDna.length*100).toFixed(1)+'%') :'0%';
}

function applySubstitution(){
  if(!mutatedDna) return;
  const dna=mutatedDna.split('');
  const pos=randInt(dna.length);
  let newBase=BASES[randInt(4)];
  while(newBase===dna[pos]) newBase=BASES[randInt(4)];
  dna[pos]=newBase;
  mutatedDna=dna.join('');
  mutationPositions.add(pos);
  renderDnaDisplay(mutatedDna, mutationPositions);
}

function applyInsertion(){
  if(!mutatedDna) return;
  const dna=mutatedDna.split('');
  const pos=randInt(dna.length);
  const newBase=BASES[randInt(4)];
  dna.splice(pos,0,newBase);
  mutatedDna=dna.join('');
  // 挿入後の位置ズレを考慮
  const newPositions=new Set();
  for(const p of mutationPositions){ newPositions.add(p>=pos?p+1:p); }
  newPositions.add(pos);
  mutationPositions.clear(); for(const p of newPositions) mutationPositions.add(p);
  renderDnaDisplay(mutatedDna, mutationPositions);
}

function applyDeletion(){
  if(!mutatedDna||mutatedDna.length===0) return;
  const dna=mutatedDna.split('');
  const pos=randInt(dna.length);
  dna.splice(pos,1);
  mutatedDna=dna.join('');
  const newPositions=new Set();
  for(const p of mutationPositions){ if(p!==pos) newPositions.add(p>pos?p-1:p); }
  mutationPositions.clear(); for(const p of newPositions) mutationPositions.add(p);
  renderDnaDisplay(mutatedDna, mutationPositions);
}

function resetDna(){
  mutatedDna=originalDna;
  mutationPositions.clear();
  renderDnaDisplay(mutatedDna, mutationPositions);
  const el=document.getElementById('sim-generation');
  if(el) el.textContent='0';
}

function runGenerations(){
  const gen=parseInt(document.getElementById('gen-slider').value)||10;
  const rate=parseFloat(document.getElementById('rate-slider').value)||1;
  let dna=mutatedDna.split('');
  let count=mutationPositions.size;
  for(let g=0;g<gen;g++){
    for(let i=0;i<dna.length;i++){
      if(Math.random()*100<rate){
        let nb=BASES[randInt(4)];
        while(nb===dna[i]) nb=BASES[randInt(4)];
        dna[i]=nb; mutationPositions.add(i); count++;
      }
    }
  }
  mutatedDna=dna.join('');
  renderDnaDisplay(mutatedDna, mutationPositions);
  const el=document.getElementById('sim-generation');
  if(el) el.textContent=gen;
}

// ---- スライドレンダラー ----
function renderSlide(idx){
  const slide=SLIDES[idx];
  const el=document.getElementById('slide-content');
  el.innerHTML='';
  const wrap=document.createElement('div');
  wrap.className='slide-wrapper';

  // スライドタイプ別に描画
  const renderers={
    intro: renderIntro, steps: renderSteps, overview: renderOverview,
    classification: renderClassification, concept: renderConcept,
    chromosome: renderChromosome, flow: renderFlow,
    simulation: renderSimulation, quiz: renderQuiz,
    score: renderScore, worksheet: renderWorksheet, reflection: renderReflection
  };

  const fn=renderers[slide.type]||renderGeneric;
  wrap.innerHTML=fn(slide);
  el.appendChild(wrap);

  // シミュレーション初期化
  if(slide.type==='simulation'){
    originalDna=generateDna(60);
    mutatedDna=originalDna;
    mutationPositions.clear();
    setTimeout(()=>renderDnaDisplay(mutatedDna, mutationPositions),100);
    setTimeout(()=>initSnpChart(),200);
  }

  // クイズ初期化
  if(slide.type==='quiz'){
    quizAnswered=false;
    document.getElementById('btn-next-quiz').style.display='none';
  }
  if(slide.type==='score') renderScoreResult();

  updateNavButtons(idx);
}

function renderChromosome(s){

function answerQuestion(qi, ci){
  const q=QUESTIONS[qi];
  const isCorrect=(ci===q.a);
  quizResults[qi]=isCorrect;
  // 選択肢を無効化
  for(let i=0;i<q.c.length;i++){
    const btn=document.getElementById(`choice-${qi}-${ci}`);
    const allBtn=document.getElementById(`choice-${qi}-${i}`);
    if(allBtn){ allBtn.disabled=true; }
  }
  const chosen=document.getElementById(`choice-${qi}-${ci}`);
  const correct=document.getElementById(`choice-${qi}-${q.a}`);
  if(chosen) chosen.classList.add(isCorrect?'correct':'wrong');
  if(!isCorrect&&correct) correct.classList.add('correct');
  const exp=document.getElementById(`exp-${qi}`);
  if(exp) exp.classList.add('show');
  // ドット更新
  const dot=document.getElementById(`qdot-${qi}`);
  if(dot){ dot.classList.add('answered'); dot.style.background=isCorrect?'var(--color-green)':'var(--color-red)'; }
}

function updateNavButtons(idx){
  const slide=SLIDES[idx];
  document.getElementById('btn-prev').disabled=(idx===0);
  document.getElementById('btn-next').disabled=(idx===SLIDES.length-1);
  // ステップ系スライドの場合
  const hasSteps=slide.type==='steps';
  const stepBtn=document.getElementById('btn-next-step');
  if(stepBtn){
    stepBtn.style.display=hasSteps?'inline-flex':'none';
    if(hasSteps){
      const maxStep=slide.steps.length;
      stepBtn.disabled=(currentStep>=maxStep-1);
    }
  }
  // プログレスバー
  const pct=((idx+1)/SLIDES.length*100).toFixed(1);
  document.getElementById('progress-bar-fill').style.width=pct+'%';
  document.getElementById('slide-counter').textContent=idx+1;
  // セクション名
  const sectionNames=['導入','復習','突然変異の概要','置換','挿入','欠失','変異の分類','SNP','ゲノム','染色体変化','進化との関連','シミュレーション','確認テスト','確認テスト','テスト結果','ワークシート','振り返り'];
  const nameEl=document.getElementById('slide-section-name');
  if(nameEl) nameEl.textContent=sectionNames[idx]||'';
}

function nextSlide(){
  if(currentSlide<SLIDES.length-1){
    currentSlide++;
    currentStep=0;
    renderSlide(currentSlide);
  }
}

function prevSlide(){
  if(currentSlide>0){
    currentSlide--;
    currentStep=0;
    renderSlide(currentSlide);
  }
}

function nextStep(){
  const slide=SLIDES[currentSlide];
  if(slide.type!=='steps') return;
  if(currentStep<slide.steps.length-1){
    currentStep++;
    const items=document.querySelectorAll('.step-item');
    items.forEach((el,i)=>{
      if(i<=currentStep){ el.classList.add('visible'); el.classList.remove('active'); }
      else { el.classList.remove('visible','active'); }
    });
    const active=document.getElementById(`step-${currentStep}`);
    if(active) active.classList.add('active');
    // ドット更新
    document.querySelectorAll('.step-dot').forEach((dot,i)=>{
      dot.classList.remove('active','done');
      if(i<currentStep) dot.classList.add('done');
      if(i===currentStep) dot.classList.add('active');
    });
    const stepBtn=document.getElementById('btn-next-step');
    if(stepBtn) stepBtn.disabled=(currentStep>=slide.steps.length-1);
  }
}
